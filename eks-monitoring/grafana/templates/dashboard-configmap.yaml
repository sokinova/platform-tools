apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-kubernetes
  namespace: {{ .Values.namespace }}
  labels:
    app: grafana
data:
  kubernetes-cluster.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "title": "Kubernetes Cluster Monitoring",
      "uid": "k8s-cluster",
      "version": 1,
      "panels": [
        {
          "title": "CPU Usage by Pod",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "" },
          "targets": [
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace!=\"\",container!=\"\"}[5m])) by (pod)",
              "legendFormat": "{{ "{{" }}pod{{ "}}" }}"
            }
          ]
        },
        {
          "title": "Memory Usage by Pod",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "" },
          "targets": [
            {
              "expr": "sum(container_memory_usage_bytes{namespace!=\"\",container!=\"\"}) by (pod) / 1024 / 1024",
              "legendFormat": "{{ "{{" }}pod{{ "}}" }}"
            }
          ]
        },
        {
          "title": "Pod Count by Namespace",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "" },
          "targets": [
            {
              "expr": "count(kube_pod_info) by (namespace)"
            }
          ]
        },
        {
          "title": "Node CPU Usage %",
          "type": "gauge",
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "" },
          "targets": [
            {
              "expr": "100 - (avg(rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) * 100)"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "max": 100,
              "min": 0,
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 60 },
                  { "color": "red", "value": 80 }
                ]
              },
              "unit": "percent"
            }
          }
        },
        {
          "title": "Node Memory Usage %",
          "type": "gauge",
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "" },
          "targets": [
            {
              "expr": "100 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes * 100)"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "max": 100,
              "min": 0,
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 60 },
                  { "color": "red", "value": 80 }
                ]
              },
              "unit": "percent"
            }
          }
        },
        {
          "title": "Pod Restarts",
          "type": "table",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 12 },
          "datasource": { "type": "prometheus", "uid": "" },
          "targets": [
            {
              "expr": "sum(kube_pod_container_status_restarts_total) by (namespace, pod) > 0",
              "format": "table",
              "instant": true
            }
          ]
        },
        {
          "title": "Disk Usage %",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 12 },
          "datasource": { "type": "prometheus", "uid": "" },
          "targets": [
            {
              "expr": "100 - (node_filesystem_avail_bytes{mountpoint=\"/\"} / node_filesystem_size_bytes{mountpoint=\"/\"} * 100)",
              "legendFormat": "{{ "{{" }}instance{{ "}}" }}"
            }
          ]
        }
      ],
      "time": { "from": "now-1h", "to": "now" },
      "refresh": "30s",
      "schemaVersion": 39,
      "templating": { "list": [] }
    }