{{- if and .Values.grafana.enabled .Values.grafana.datasources.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: {{ .Values.namespace.name }}

data:
  datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        uid: prometheus
        type: prometheus
        access: proxy
        url: {{ .Values.grafana.datasources.prometheus.url | quote }}
        isDefault: true
{{- end }}

