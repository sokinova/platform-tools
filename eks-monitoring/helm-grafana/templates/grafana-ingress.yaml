{{- if and .Values.grafana.enabled .Values.grafana.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana
  namespace: {{ .Values.namespace.name }}
  annotations:
    nginx.ingress.kubernetes.io/whitelist-source-range: {{ .Values.grafana.ingress.whitelistSourceRange | default "0.0.0.0/0" }}
    external-dns.alpha.kubernetes.io/hostname: {{ .Values.grafana.ingress.host | quote }}
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: {{ .Values.grafana.ingress.className | default "nginx"}}
  rules:
    - host: {{ .Values.grafana.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: {{ .Values.grafana.service.port }}
  tls:
  - hosts:
      - {{ .Values.grafana.ingress.host }}
    secretName: {{ .Values.grafana.ingress.tlsSecretName | quote }}

{{- end }}