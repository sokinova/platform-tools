{{- if and .Values.grafana.enabled .Values.grafana.datasources.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: {{ .Values.namespace.name }}
data:
  datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://{{ .Values.namespace.name }}-prometheus:{{ .Values.prometheus.service.port }} 
        isDefault: true
{{- end }}