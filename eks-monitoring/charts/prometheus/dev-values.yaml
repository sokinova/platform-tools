namespace: monitoring

scrapeInterval: 30s
evaluationInterval: 30s

server:
  replicas: 1
  image:
    repository: prom/prometheus
    tag: v2.53.0
  retention: 7d
  storage:
    size: 5Gi
    storageClass: gp2
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi

nodeExporter:
  image:
    repository: prom/node-exporter
    tag: v1.8.1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 128Mi

kubeStateMetrics:
  image:
    repository: registry.k8s.io/kube-state-metrics/kube-state-metrics
    tag: v2.12.0
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 256Mi