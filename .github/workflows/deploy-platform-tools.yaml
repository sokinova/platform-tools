# ============================================================
# Platform Tools Deployment Workflow
# ============================================================
# Deploys platform tools (ingress-nginx, EFK logging stack, Karpenter, etc.)
# to the EKS cluster. Triggers on push to main or feature branches.
#
# EFK deployment order:
#   1. IRSA setup — IAM role for FluentD S3 access
#   2. ECR build  — Custom FluentD image with ES8 + S3 plugins
#   3. Elasticsearch — First (creates namespace, provides the search backend)
#   4. Kibana — Second (connects to ES for log visualization)
#   5. FluentD — Third (collects logs from all nodes, sends to ES + S3)
#   6. Auth secret — Kibana basic-auth credentials
#   7. Verify + integration tests
# ============================================================

name: 'Workflow - Deploy Platform Tools'

on:
  push:
    branches:
      - feature/**
      - main

# OIDC permissions for AWS authentication (no stored access keys)
permissions:
  id-token: write
  contents: read

# Environment variables shared across all steps
env:
  AWS_REGION: "us-east-1"
  ENVIRONMENT_STAGE: "dev"
  CLUSTER_NAME: "projectx_cluster_ubuntu25b"

jobs:
  deploy-platform-tools:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    environment: dev

    steps:
      - uses: actions/checkout@v3

      # Authenticate with AWS using OIDC (GitHub Actions role)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.IAM_ROLE }}
          role-session-name: GitHubActionsRoleSession
          aws-region: ${{ env.AWS_REGION }}

      # Connect kubectl to the EKS cluster
      - name: Login to EKS - update kubeconfig
        run: aws eks update-kubeconfig --name $CLUSTER_NAME --region $AWS_REGION

      # Deploy the nginx ingress controller (required before any Ingress resources)
      - name: Deploy ingress-nginx controller
        run: kubectl apply -f ingress-nginx/deploy.yaml

      # --- EFK Logging Stack ---

      # Create the IAM role and trust policy for FluentD's S3 access via IRSA
      - name: Setup IRSA for FluentD
        run: ./eks-logging/iam/irsa-setup.sh ${ENVIRONMENT_STAGE}

      # Build the custom FluentD Docker image (with ES8 + S3 plugins) and push to ECR
      - name: Login to ECR and build FluentD image
        run: |
          AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR_REPO="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/fluentd-es-s3"
          aws ecr get-login-password --region ${AWS_REGION} | docker login --username AWS --password-stdin "${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com" || true
          aws ecr describe-repositories --repository-names fluentd-es-s3 --region ${AWS_REGION} 2>/dev/null || \
            aws ecr create-repository --repository-name fluentd-es-s3 --image-scanning-configuration scanOnPush=true --region ${AWS_REGION}
          docker build -t "${ECR_REPO}:v1.16-es8-s3" -f eks-logging/docker/fluentd/Dockerfile .
          docker push "${ECR_REPO}:v1.16-es8-s3"

      # Deploy Elasticsearch first — it creates the logging namespace and provides the
      # search backend that Kibana and FluentD depend on
      - name: Deploy Elasticsearch
        run: |
          helm upgrade --install elasticsearch-${ENVIRONMENT_STAGE} ./eks-logging/helm-elasticsearch \
            --namespace logging --create-namespace \
            --values ./eks-logging/helm-elasticsearch/values/${ENVIRONMENT_STAGE}-values.yaml \
            --wait --timeout 10m

      # Deploy Kibana — connects to ES using the explicit "logging-elasticsearch" service name
      - name: Deploy Kibana
        run: |
          helm upgrade --install kibana-${ENVIRONMENT_STAGE} ./eks-logging/helm-kibana \
            --namespace logging \
            --values ./eks-logging/helm-kibana/values/${ENVIRONMENT_STAGE}-values.yaml \
            --wait --timeout 5m

      # Deploy FluentD — pass AWS account ID at install time for IRSA annotation
      # and ECR image URL computation in the DaemonSet template
      - name: Deploy FluentD
        run: |
          AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          helm upgrade --install fluentd-${ENVIRONMENT_STAGE} ./eks-logging/helm-fluentd \
            --namespace logging \
            --values ./eks-logging/helm-fluentd/values/${ENVIRONMENT_STAGE}-values.yaml \
            --set aws.accountId=${AWS_ACCOUNT_ID} \
            --wait --timeout 5m

      # Create the Kibana basic-auth K8s secret (credentials from SecretsManager)
      - name: Create Kibana auth secret
        run: ./eks-logging/scripts/create-kibana-secret.sh ${ENVIRONMENT_STAGE}

      # Verify all EFK components are deployed and running
      - name: Verify EFK deployment
        run: |
          kubectl get pods -n logging
          kubectl get svc -n logging
          kubectl get ingress -n logging

      # Run integration tests — checks ES health, pod status, log flow, S3 writes
      - name: Run EFK integration tests
        run: ./eks-logging/scripts/test-logging.sh ${ENVIRONMENT_STAGE}

      # Placeholder for Karpenter deployment (separate ticket)
      - name: Deploy Karpenter
        run: |
            echo "Deploy Karpenter steps go here"

      # Placeholder for additional platform tools
      - name: Finalize Deployment
        run: |
            echo "Final deployment steps and cleanup"
