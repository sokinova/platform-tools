# This worflow is primarily for platform/devops tools that need to be deployed into K8s cluster
# or tools that don't belong to Terraform
name: 'Workflow - Deploy Platform Tools'

on:
  push:
    branches:
      - feature/**
      - main

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: "us-east-1"
  ENVIRONMENT_STAGE: "dev"

jobs:
  deploy-platform-tools:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    environment: dev

    steps:
      - uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.IAM_ROLE }}
          role-session-name: GitHubActionsRoleSession
          aws-region: ${{ env.AWS_REGION }}

      # Login to EKS, make sure to switch to the permanent cluster created with terraform once it's up
      - name: Login to EKS - update kubeconfig
        run: aws eks update-kubeconfig --name temp-eks-cluster --region $AWS_REGION

      # Add deployment steps for each tool below
      - name: Deploy ingress-nginx controller
        run: kubectl apply -f ingress-nginx/deploy.yaml

      # Example for a tool like Karpenter
      - name: Deploy Karpenter
        run: |
            echo "Deploy Karpenter steps go here"

      # Example for a tool like EKS Logging
      - name: Deploy EKS Logging
        run: |
            echo "Deploy EKS Logging steps go here"
       # Deploying Prometheus and Grafana monitoring setup     
      - name: Deploy Prometheus (dev)
        run: |
          helm upgrade --install eks-monitoring-prometheus ./eks-monitoring/helm-prometheus \
            -n eks-monitoring-dev --create-namespace \
            -f ./eks-monitoring/helm-prometheus/values/dev-values.yaml

      - name: Deploy Grafana (dev)
        run: |
          helm upgrade --install eks-monitoring-grafana ./eks-monitoring/helm-grafana \
            -n eks-monitoring-dev --create-namespace \
            -f ./eks-monitoring/helm-grafana/values/dev-values.yaml


      # Repeat for each additional tool...
      # Example: Deploy External DNS
      # Example: Setup K8s User Roles

      - name: Finalize Deployment
        run: |
            echo "Final deployment steps and cleanup"

