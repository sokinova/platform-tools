# This worflow is primarily for platform/devops tools that need to be deployed into K8s cluster
# or tools that don't belong to Terraform
name: 'Workflow - Deploy Platform Tools'

on:
  push:
    branches:
      - feature/**
      - main

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: "us-east-1"
  ENVIRONMENT_STAGE: "dev"
  CLUSTER_NAME: "projectx_cluster_ubuntu25b"


jobs:
  deploy-platform-tools:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    environment: dev

    steps:
      - uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.IAM_ROLE }}
          role-session-name: GitHubActionsRoleSession
          aws-region: ${{ env.AWS_REGION }}

      # Install Helm
      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: 'v3.13.0'

      # Login to EKS, make sure to switch to the permanent cluster created with terraform once it's up
      - name: Login to EKS - update kubeconfig
        run: aws eks update-kubeconfig --name $CLUSTER_NAME --region $AWS_REGION
      
      - name: get caller identity
        run: aws sts get-caller-identity
      
      - name: for debugging
        run: kubectl get pods -A

      # Add deployment steps for each tool below
      - name: Deploy ingress-nginx controller
        run: kubectl apply -f ingress-nginx/deploy.yaml

      # Example for a tool like Karpenter
      - name: Deploy Karpenter
        run: |
            echo "Deploy Karpenter steps go here"

      # Example for a tool like EKS Logging
      - name: Deploy EKS Logging
        run: |
            echo "Deploy EKS Logging steps go here"
      
      # Repeat for each additional tool...
      # Example: Deploy External DNS
      # Setup K8s User Roles
      # Create Cluster role and RBAC
      - name: Deploy Cluster role and RBAC
        run: |
            helm upgrade --install read-access k8s-user-roles/ReadAccessClusterRole \
            -f k8s-user-roles/ReadAccessClusterRole/values-${ENVIRONMENT_STAGE}.yaml \
            --namespace helm-system \
            --create-namespace  

      #Install AWS CLI
      - name: Ensure AWS CLI is installed
        run: |
            if ! command -v aws &> /dev/null
            then
              echo "AWS CLI not found. Installing..."
              curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
              unzip -q awscliv2.zip
              sudo ./aws/install
            else
              echo "AWS CLI already installed"
            fi

      # Create aws eks access entry
      - name: Create EKS Access Entry
        run: |
          aws eks create-access-entry \
            --cluster-name $CLUSTER_NAME \
            --principal-arn arn:aws:iam::383585068161:role/DeveloperProdAccessRole-ubuntu25b \
            --type STANDARD \
            --kubernetes-groups dev-team \
            --username DeveloperProdAccessRole
      
      # Verify Access Entry 
      - name: Verify Access Entry
        run: |
          aws eks list-access-entries \
            --cluster-name $CLUSTER_NAME

      - name: Finalize Deployment
        run: |
            echo "Final deployment steps and cleanup"

