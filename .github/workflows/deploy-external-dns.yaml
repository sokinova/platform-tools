---
name: "Workflow - Deploy External DNS to EKS Cluster"

on:
  push:
    branches:
      - feature/MRP25BUBUN-9-external-dns
      - main
  pull_request:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: "us-east-1"
  CLUSTER_NAME: "projectx_cluster_ubuntu25b"
  NAMESPACE: "external-dns"

jobs:
  deploy-external-dns:
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    environment: dev

    steps:
      - uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.IAM_ROLE }}
          role-session-name: GitHubActionsRoleSession
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Login to EKS - update kubeconfig
        run: >
          aws eks update-kubeconfig
          --name $CLUSTER_NAME
          --region $AWS_REGION

      - name: Deploy external-dns (Helm)  
        run: >
          helm upgrade --install external-dns external-dns/external-dns-helm
          --namespace $NAMESPACE
          --create-namespace
          -f external-dns/external-dns-helm/values.yaml
          --atomic

      - name: Verify external-dns rollout  # make sure pods are healthy
        run: |
          kubectl get pods -n external-dns
          kubectl rollout status deploy/external-dns \
            -n $NAMESPACE \
            --timeout=180s


#helm lint ./external-dns/external-dns-helm - command to validate the workflow