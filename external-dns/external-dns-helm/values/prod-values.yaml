# ExternalDNS (PRODUCTION) values.yaml
# Same EKS cluster + same Route53 hosted zone

# Separation model:
#   - One ExternalDNS release per env (dev/stage/prod)
#   - Same hosted zone ID, but each env manages a different DNS scope using --domain-filter
#   - Unique TXT registry ownership per env to prevent record “ownership fights”
#   - Prometheus scraping via pod annotations (no Prometheus Operator / ServiceMonitor CRDs)


global:
  imagePullSecrets: [] # Keep empty unless pulling from a private registry

image:
  repository: registry.k8s.io/external-dns/external-dns # Official upstream image
  pullPolicy: IfNotPresent 

serviceAccount:
  create: true
  annotations:
    # ENV-SPECIFIC: IRSA role for prod; must match IAM trust policy (namespace + SA name)
    eks.amazonaws.com/role-arn: arn:aws:iam::383585068161:role/production-projectx_cluster_ubuntu25b-external-dns-irsa
  name: external-dns # Recommended: same SA name across envs; namespace (or role) provides separation
  automountServiceAccountToken: true # Required for IRSA web identity token mount

service:
  port: 7979 # ExternalDNS metrics/health endpoints (Prometheus scrapes /metrics)

rbac:
  create: true # ExternalDNS needs RBAC to watch Ingress (and other sources if enabled)

deploymentStrategy:
  type: RollingUpdate # Recommended in prod to avoid gaps during upgrades

automountServiceAccountToken: true # Ensure pod token is mounted for IRSA

shareProcessNamespace: false # Default; keep isolation between containers

podSecurityContext:
  runAsNonRoot: true
  fsGroup: 65534
  seccompProfile:
    type: RuntimeDefault

podAnnotations:
  # IMPORTANT: Prometheus is configured to scrape pods with prometheus.io/scrape="true"
  prometheus.io/scrape: "true"
  prometheus.io/port: "7979"
  prometheus.io/path: "/metrics"

securityContext:
  privileged: false
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  capabilities:
    drop: ["ALL"]

livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 2
  successThreshold: 1

readinessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6
  successThreshold: 1

serviceMonitor:
  enabled: false # No Prometheus Operator CRDs in the cluster; ServiceMonitor won't work
  interval: 1m

logLevel: info # Prod: keep noise down unless debugging
logFormat: text

interval: 1m # How often ExternalDNS reconciles DNS records

triggerLoopOnEvent: false # Keep off unless you explicitly want event-triggered loops

namespaced: false # Watches cluster-wide; domain-filter + TXT ownership do the safety work

sources:
  - ingress # Create DNS from Ingress resources

# PROD RECOMMENDATION:
# - sync can delete records when resources disappear
# - upsert-only is safer in prod (no automatic deletes)
policy: upsert-only # Safer for prod than sync

registry: txt # TXT registry prevents multiple instances from clobbering records

# ENV-SPECIFIC: Must be unique per env to avoid ownership conflicts across dev/stage/prod
txtOwnerId: projectx_cluster_ubuntu25b-prod
txtPrefix: external-dns-prod-

annotationFilter: "" # Optional gate; leave empty unless you enforce an env tag like external-dns/env=prod
annotationPrefix: "" # Not needed unless using prefixed annotations

provider:
  name: aws
  webhook:
    image:
      pullPolicy: IfNotPresent
    livenessProbe:
      httpGet:
        path: /healthz
        port: http-webhook
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 2
      successThreshold: 1

    readinessProbe:
      httpGet:
        path: /healthz
        port: http-webhook
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 6
      successThreshold: 1

    service:
      port: 8080

    serviceMonitor:
      interval: 1m # Ignored unless you have Prometheus Operator

extraArgs:
  # Prometheus metrics endpoint
  - --metrics-address=:7979

  # PROD SCOPE:
  # If prod owns the root domain, keep this.
  # If you want prod isolated too, use --domain-filter=prod.312ubuntu.com instead.
  - --domain-filter=312ubuntu.com

  # Same hosted zone for all envs -> zone-id-filter remains identical across envs
  - --zone-id-filter=Z09469413H61XF9MA5W6E

secretConfiguration:
  enabled: false # Keep off unless you're providing credentials via secrets (IRSA is preferred)