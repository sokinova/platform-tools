# ExternalDNS (STAGE) values.yaml
# Same EKS cluster + same Route53 hosted zone

# Separation model:
#   - One ExternalDNS release per env (dev/stage/prod)
#   - Same hosted zone ID, but each env manages a different DNS scope using --domain-filter
#   - Unique TXT registry ownership per env to prevent envs fighting over records
#   - Prometheus scraping via pod annotations (no Prometheus Operator / ServiceMonitor CRDs)


global:
  imagePullSecrets: [] # Keep empty unless pulling from a private registry

image:
  repository: registry.k8s.io/external-dns/external-dns # Official upstream image
  pullPolicy: IfNotPresent # Avoid unnecessary pulls

serviceAccount:
  create: true
  annotations:
    # ENV-SPECIFIC: stage IRSA role; must match IAM trust policy (namespace + SA name)
    eks.amazonaws.com/role-arn: arn:aws:iam::383585068161:role/staging-projectx_cluster_ubuntu25b-external-dns-irsa
  name: external-dns # Keep SA name consistent; isolate by namespace and/or role
  automountServiceAccountToken: true # Required for IRSA web identity token mount

service:
  port: 7979 # Metrics endpoint (Prometheus scrapes /metrics) + health checks

rbac:
  create: true # Required to watch Ingress resources

deploymentStrategy:
  type: RollingUpdate # Better than Recreate; avoids gaps during upgrades

automountServiceAccountToken: true # Ensure pod token is mounted for IRSA

shareProcessNamespace: false

podSecurityContext:
  runAsNonRoot: true
  fsGroup: 65534
  seccompProfile:
    type: RuntimeDefault

podAnnotations:
  # IMPORTANT: Your Prometheus scrapes pods with prometheus.io/scrape="true"
  prometheus.io/scrape: "true"
  prometheus.io/port: "7979"
  prometheus.io/path: "/metrics"

securityContext:
  privileged: false
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  capabilities:
    drop: ["ALL"]

livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 2
  successThreshold: 1

readinessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6
  successThreshold: 1

serviceMonitor:
  enabled: false # No Prometheus Operator CRDs in your cluster; ServiceMonitor won't work
  interval: 1m

logLevel: debug # Stage: keep debug while validating; switch to info once stable
logFormat: text

interval: 1m # Reconcile frequency

triggerLoopOnEvent: false

namespaced: false # Watches cluster-wide; safety comes from domain-filter + TXT ownership

sources:
  - ingress # Manage DNS based on Ingress resources

policy: sync # Stage: OK to auto-delete when ingresses disappear (prod should be upsert-only)

registry: txt # TXT registry prevents multiple ExternalDNS instances clobbering each other

# ENV-SPECIFIC: Must be unique per env (dev/stage/prod)
txtOwnerId: projectx_cluster_ubuntu25b-stage
txtPrefix: external-dns-stage-

annotationFilter: "" # Optional gate; leave empty unless you enforce env tagging
annotationPrefix: "" # Leave empty unless you intentionally use prefixed annotations

provider:
  name: aws
  webhook:
    image:
      pullPolicy: IfNotPresent
    livenessProbe:
      httpGet:
        path: /healthz
        port: http-webhook
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 2
      successThreshold: 1

    readinessProbe:
      httpGet:
        path: /healthz
        port: http-webhook
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 6
      successThreshold: 1

    service:
      port: 8080

    serviceMonitor:
      interval: 1m # Ignored unless Prometheus Operator exists

extraArgs:
  # Prometheus metrics endpoint
  - --metrics-address=:7979

  # ENV-SPECIFIC: Stage should only manage the stage subdomain inside the shared hosted zone
  - --domain-filter=stage.312ubuntu.com

  # Same hosted zone for all envs -> zone-id-filter remains identical across envs
  - --zone-id-filter=Z09469413H61XF9MA5W6E

secretConfiguration:
  enabled: false # IRSA is preferred over static secrets