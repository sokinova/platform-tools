# Default values for eks-logging chart.
# Dev-friendly defaults — override per environment in values/<env>-values.yaml.

global:
  team: ubuntu
  environment: dev

# AWS configuration — accountId must be passed via --set
aws:
  accountId: ""
  region: us-east-1

# Namespace
namespace:
  create: true
  name: logging

# -- Elasticsearch --
elasticsearch:
  enabled: true
  image:
    repository: docker.elastic.co/elasticsearch/elasticsearch
    tag: 8.5.1
    pullPolicy: IfNotPresent
  replicas: 1
  clusterName: eks-logging

  security:
    enabled: false
    transportSsl: false

  javaOpts: "-Xmx512m -Xms512m"

  persistence:
    enabled: false
    storageClass: gp2
    size: 10Gi

  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "1"
      memory: 2Gi

  # Anti-affinity: "" (none), "soft", or "hard"
  antiAffinity: ""

  pdb:
    enabled: false
    maxUnavailable: 1

  service:
    type: ClusterIP
    httpPort: 9200
    transportPort: 9300

  probes:
    readiness:
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
    liveness:
      initialDelaySeconds: 90
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
    startup:
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 30

  sysctlInit:
    enabled: true

  terminationGracePeriodSeconds: 120

# -- Kibana --
kibana:
  enabled: true
  image:
    repository: docker.elastic.co/kibana/kibana
    tag: 8.5.1
    pullPolicy: IfNotPresent
  replicas: 1
  serverName: kibana

  security:
    enabled: false
    encryptionKey: ""

  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi

  service:
    type: ClusterIP
    port: 5601

  probes:
    readiness:
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
    liveness:
      initialDelaySeconds: 60
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
    startup:
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 30

  antiAffinity: ""

  pdb:
    enabled: false
    maxUnavailable: 1

  ingress:
    enabled: true
    className: nginx
    host: kibana-ubuntu-dev.312ubuntu.com
    tls:
      enabled: false
      secretName: kibana-tls
    sslRedirect: "false"
    whitelistSourceRange: "73.45.178.26/32"
    authSecret: kibana-basic-auth
    authRealm: "Kibana Authentication"
    proxyBodySize: 50m
    proxyReadTimeout: "120"
    proxySendTimeout: "120"

# -- FluentD --
fluentd:
  enabled: true
  image:
    repository: ""  # Auto-computed from aws.accountId if empty (ECR: fluentd-es-s3)
    tag: v1.16-es8-s3
    pullPolicy: Always

  serviceAccount:
    create: true
    name: ""  # Defaults to fluentd-<environment> (set in env values files)

  securityContext:
    runAsUser: 0
    runAsGroup: 0

  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  output:
    elasticsearch:
      host: ""  # Auto-computed from release name if empty
      port: 9200
      scheme: http
      buffer:
        type: file
        path: /tmp/fluentd-es-buffer
        flushInterval: 5s
        flushThreadCount: 2
        chunkLimitSize: 2M
        totalLimitSize: 500M
        retryMaxInterval: 30
        retryForever: "true"
    s3:
      bucket: ""  # e.g. eks-logs-312ubuntu-dev
      region: us-east-1
      path: logs/
      encryption: AES256
      buffer:
        type: file
        path: /tmp/fluentd-s3-buffer
        timekey: 3600
        timekeyWait: 10m
        chunkLimitSize: 8m
        totalLimitSize: 5G

  clusterName: temp-eks-cluster
  priorityClassName: ""
  tolerations:
    - key: node-role.kubernetes.io/master
      effect: NoSchedule
    - key: node-role.kubernetes.io/control-plane
      effect: NoSchedule
  updateStrategy:
    type: RollingUpdate
