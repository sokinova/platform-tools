# Staging environment values — 2 replicas, persistence, security on, TLS

global:
  environment: staging

elasticsearch:
  replicas: 2
  javaOpts: "-Xmx1g -Xms1g"
  persistence:
    enabled: true
    storageClass: gp2
    size: 50Gi
  resources:
    requests:
      cpu: "1"
      memory: 2Gi
    limits:
      cpu: "2"
      memory: 4Gi
  antiAffinity: soft
  pdb:
    enabled: true
    maxUnavailable: 1
  security:
    enabled: true
    transportSsl: false

kibana:
  replicas: 1
  security:
    enabled: true
  ingress:
    enabled: true
    host: kibana-ubuntu-staging.312ubuntu.com
    tls:
      enabled: true
      secretName: kibana-tls-staging
    sslRedirect: "true"
    whitelistSourceRange: "73.45.178.26/32"

fluentd:
  serviceAccount:
    name: fluentd-staging
  output:
    elasticsearch:
      scheme: http
      buffer:
        flushInterval: 10s
        flushThreadCount: 2
    s3:
      bucket: eks-logs-312ubuntu-staging
  clusterName: eks-cluster-staging
