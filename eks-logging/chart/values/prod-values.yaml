# Prod environment values — 3 replicas, large PVC, security on, TLS, PDBs, hard anti-affinity

global:
  environment: prod

elasticsearch:
  replicas: 3
  javaOpts: "-Xmx2g -Xms2g"
  persistence:
    enabled: true
    storageClass: gp2
    size: 100Gi
  resources:
    requests:
      cpu: "2"
      memory: 4Gi
    limits:
      cpu: "4"
      memory: 8Gi
  antiAffinity: hard
  pdb:
    enabled: true
    maxUnavailable: 1
  security:
    enabled: true
    transportSsl: true

kibana:
  replicas: 2
  security:
    enabled: true
  ingress:
    enabled: true
    host: kibana-ubuntu-prod.312ubuntu.com
    tls:
      enabled: true
      secretName: kibana-tls-prod
    sslRedirect: "true"
    whitelistSourceRange: "73.45.178.26/32"
  pdb:
    enabled: true
    maxUnavailable: 1

fluentd:
  serviceAccount:
    name: fluentd-prod
  output:
    elasticsearch:
      scheme: http
      buffer:
        flushInterval: 10s
        flushThreadCount: 4
        chunkLimitSize: 4M
        totalLimitSize: 1G
    s3:
      bucket: eks-logs-312ubuntu-prod
      buffer:
        chunkLimitSize: 512M
        totalLimitSize: 10G
  clusterName: eks-cluster-prod
  priorityClassName: system-node-critical
