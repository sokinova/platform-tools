{{- if .Values.fluentd.enabled }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "eks-logging.componentName" (dict "component" "fluentd" "context" $) }}
  namespace: {{ include "eks-logging.namespace" . }}
  labels:
    {{- include "eks-logging.fluentdLabels" (dict "context" $) | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "eks-logging.selectorLabels" (dict "component" "fluentd" "context" $) | nindent 6 }}
  updateStrategy:
    type: {{ .Values.fluentd.updateStrategy.type }}
  template:
    metadata:
      labels:
        {{- include "eks-logging.fluentdLabels" (dict "context" $) | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/fluentd-configmap.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ .Values.fluentd.serviceAccount.name }}
      {{- if .Values.fluentd.priorityClassName }}
      priorityClassName: {{ .Values.fluentd.priorityClassName }}
      {{- end }}
      securityContext:
        runAsUser: {{ .Values.fluentd.securityContext.runAsUser }}
        runAsGroup: {{ .Values.fluentd.securityContext.runAsGroup }}
      {{- if .Values.fluentd.tolerations }}
      tolerations:
        {{- toYaml .Values.fluentd.tolerations | nindent 8 }}
      {{- end }}
      containers:
        - name: fluentd
          {{- $fluentdRepo := .Values.fluentd.image.repository }}
          {{- if not $fluentdRepo }}
          {{- $fluentdRepo = printf "%s.dkr.ecr.%s.amazonaws.com/fluentd-es-s3" (toString .Values.aws.accountId) .Values.aws.region }}
          {{- end }}
          image: "{{ $fluentdRepo }}:{{ .Values.fluentd.image.tag }}"
          imagePullPolicy: {{ .Values.fluentd.image.pullPolicy }}
          env:
            - name: FLUENTD_CONF
              value: fluent.conf
          volumeMounts:
            - name: config
              mountPath: /fluentd/etc/fluent.conf
              subPath: fluent.conf
            - name: varlog
              mountPath: /var/log
            - name: dockercontainers
              mountPath: /var/lib/docker/containers
              readOnly: true
          resources:
            {{- toYaml .Values.fluentd.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "eks-logging.componentName" (dict "component" "fluentd" "context" $) }}-config
        - name: varlog
          hostPath:
            path: /var/log
        - name: dockercontainers
          hostPath:
            path: /var/lib/docker/containers
{{- end }}
