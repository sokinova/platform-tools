{{- if .Values.kibana.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "eks-logging.componentName" (dict "component" "kibana" "context" $) }}
  namespace: {{ include "eks-logging.namespace" . }}
  labels:
    {{- include "eks-logging.kibanaLabels" (dict "context" $) | nindent 4 }}
spec:
  type: {{ .Values.kibana.service.type }}
  ports:
    - name: http
      port: {{ .Values.kibana.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "eks-logging.selectorLabels" (dict "component" "kibana" "context" $) | nindent 4 }}
{{- end }}
