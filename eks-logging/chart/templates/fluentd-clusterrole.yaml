{{- if .Values.fluentd.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "eks-logging.componentName" (dict "component" "fluentd" "context" $) }}
  labels:
    {{- include "eks-logging.fluentdLabels" (dict "context" $) | nindent 4 }}
rules:
  - apiGroups: [""]
    resources:
      - pods
      - namespaces
    verbs:
      - get
      - list
      - watch
{{- end }}
