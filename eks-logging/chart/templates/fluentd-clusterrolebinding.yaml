{{- if .Values.fluentd.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "eks-logging.componentName" (dict "component" "fluentd" "context" $) }}
  labels:
    {{- include "eks-logging.fluentdLabels" (dict "context" $) | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "eks-logging.componentName" (dict "component" "fluentd" "context" $) }}
subjects:
  - kind: ServiceAccount
    name: {{ .Values.fluentd.serviceAccount.name }}
    namespace: {{ include "eks-logging.namespace" . }}
{{- end }}
