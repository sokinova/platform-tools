# FluentD configuration file (fluent.conf) rendered as a ConfigMap.
# Mounted into the FluentD container at /fluentd/etc/fluent.conf.
#
# The pipeline has 4 stages:
#   01 Sources   — Tail container log files from /var/log/containers/*.log
#   02 Filters   — Enrich logs with K8s metadata (pod name, namespace, labels)
#   03 Dispatch  — Add Prometheus metrics for monitoring log throughput
#   04 Outputs   — Dual output: Elasticsearch (real-time) + S3 (backup)
#
# Label-based routing (@KUBERNETES -> @DISPATCH -> @OUTPUT) keeps stages isolated
# and prevents accidental log duplication.
{{- if .Values.fluentd.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.namespace.name }}-fluentd-config
  namespace: {{ .Values.namespace.name }}
  labels:
    app: fluentd
data:
  fluent.conf: |
    # ============================================================
    # 01 — Sources: Tail container logs and expose Prometheus metrics
    # ============================================================
    # Reads all container log files written by the container runtime.
    # Supports both JSON (Docker) and CRI log formats via multi_format parser.
    # Routes all logs to the @KUBERNETES label for enrichment.
    <source>
      @type tail
      @id in_tail_container_logs
      @label @KUBERNETES
      path /var/log/containers/*.log
      pos_file /var/log/fluentd-containers.log.pos
      tag kubernetes.*
      read_from_head true
      <parse>
        @type multi_format
        # JSON format — used by Docker runtime
        <pattern>
          format json
          time_key time
          time_type string
          time_format "%Y-%m-%dT%H:%M:%S.%NZ"
          keep_time_key false
        </pattern>
        # CRI format — used by containerd runtime (space-separated fields)
        <pattern>
          format regexp
          expression /^(?<time>.+) (?<stream>stdout|stderr)( (.))? (?<log>.*)$/
          time_format '%Y-%m-%dT%H:%M:%S.%NZ'
          keep_time_key false
        </pattern>
      </parse>
      emit_unmatched_lines true
    </source>

    # ============================================================
    # 02 — Filters: Enrich logs with K8s metadata and custom fields
    # ============================================================
    <label @KUBERNETES>
      # Redirect FluentD's own logs to @FLUENT_LOG to prevent feedback loops
      # Without this, FluentD would collect and re-process its own output
      <match kubernetes.var.log.containers.fluentd**>
        @type relabel
        @label @FLUENT_LOG
      </match>

      # Enrich each log record with K8s metadata (pod name, namespace, container, labels)
      # Uses the kubernetes_metadata filter plugin to query the K8s API
      <filter kubernetes.**>
        @type kubernetes_metadata
        @id filter_kube_metadata
        skip_labels false
        skip_container_metadata false
        skip_namespace_metadata true
        skip_master_url true
      </filter>

      # Add custom fields to every log record for easier filtering in Kibana
      <filter kubernetes.**>
        @type record_transformer
        <record>
          cluster_name {{ .Values.fluentd.clusterName }}
          environment {{ .Values.global.environment }}
        </record>
      </filter>

      # Forward enriched logs to the dispatch stage
      <match **>
        @type relabel
        @label @DISPATCH
      </match>
    </label>

    # ============================================================
    # FluentD's own logs — discard to prevent infinite feedback loop
    # ============================================================
    # FluentD's internal logs are relabeled to @FLUENT_LOG above.
    # This label catches them and discards them with @type null.
    <label @FLUENT_LOG>
      <match **>
        @type null
      </match>
    </label>

    # ============================================================
    # 03 — Dispatch: Prometheus metrics then forward to output
    # ============================================================
    # Counts incoming records for Prometheus scraping (monitoring integration).
    # Then forwards to the output stage for delivery to ES and S3.
    <label @DISPATCH>
      <filter **>
        @type prometheus
        <metric>
          name fluentd_input_status_num_records_total
          type counter
          desc The total number of incoming records
          <labels>
            tag ${tag}
            hostname ${hostname}
          </labels>
        </metric>
      </filter>

      <match **>
        @type relabel
        @label @OUTPUT
      </match>
    </label>

    # ============================================================
    # 04 — Outputs: Dual output — Elasticsearch (primary) + S3 (backup)
    # ============================================================
    # Uses @type copy to send every log record to both destinations.
    # ES provides real-time search and Kibana dashboards.
    # S3 provides long-term backup for compliance and disaster recovery.
    <label @OUTPUT>
      <match **>
        @type copy

        # Primary output: Elasticsearch for real-time search and dashboards
        <store>
          @type elasticsearch
          @id out_es
          host {{ .Values.fluentd.output.elasticsearch.host }}
          port {{ .Values.fluentd.output.elasticsearch.port }}
          scheme {{ .Values.fluentd.output.elasticsearch.scheme }}
          ssl_verify false
          # logstash_format creates daily indices: kubernetes-YYYY.MM.DD
          logstash_format true
          logstash_prefix kubernetes
          # suppress_type_name required for ES 8.x (types were removed)
          suppress_type_name true
          include_tag_key true
          <buffer>
            @type {{ .Values.fluentd.output.elasticsearch.buffer.type }}
            path {{ .Values.fluentd.output.elasticsearch.buffer.path }}
            flush_mode interval
            flush_interval {{ .Values.fluentd.output.elasticsearch.buffer.flushInterval }}
            retry_type exponential_backoff
            retry_forever false
            retry_max_interval {{ .Values.fluentd.output.elasticsearch.buffer.retryMaxInterval }}
            chunk_limit_size {{ .Values.fluentd.output.elasticsearch.buffer.chunkLimitSize }}
            queue_limit_length 8
            overflow_action block
          </buffer>
        </store>

        # Secondary output: S3 for long-term log retention
        # Only enabled when an S3 bucket is configured in values
        {{- if .Values.fluentd.output.s3.bucket }}
        <store>
          @type s3
          @id out_s3
          s3_bucket {{ .Values.fluentd.output.s3.bucket }}
          s3_region {{ .Values.fluentd.output.s3.region }}
          path {{ .Values.fluentd.output.s3.path }}
          s3_object_key_format %{path}%{index}.%{file_extension}
          # Compress logs with gzip to reduce S3 storage costs
          store_as gzip
          # Server-side encryption for data at rest
          {{- if .Values.fluentd.output.s3.encryption }}
          use_server_side_encryption {{ .Values.fluentd.output.s3.encryption }}
          {{- end }}
          <buffer>
            @type {{ .Values.fluentd.output.s3.buffer.type }}
            path {{ .Values.fluentd.output.s3.buffer.path }}
            flush_mode interval
            # Flush to S3 every 60 seconds
            flush_interval 60s
            retry_type exponential_backoff
            retry_forever false
            retry_max_interval 30
            chunk_limit_size {{ .Values.fluentd.output.s3.buffer.chunkLimitSize }}
            queue_limit_length 8
            overflow_action block
          </buffer>
          <format>
            @type json
          </format>
        </store>
        {{- end }}

      </match>
    </label>
{{- end }}
