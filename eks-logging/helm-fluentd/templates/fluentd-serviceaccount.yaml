# ServiceAccount for FluentD with IRSA (IAM Roles for Service Accounts) annotation.
# The eks.amazonaws.com/role-arn annotation tells the EKS pod identity webhook to
# inject AWS credentials into the FluentD pod, giving it S3 write access without
# storing static AWS credentials.
#
# The role ARN follows the convention: arn:aws:iam::{accountId}:role/fluentd-s3-{env}
# The role is created by iam/irsa-setup.sh (dev) or IAM automation (staging/prod).
# toString is used on aws.accountId to prevent Helm from rendering it as scientific notation.
{{- if and .Values.fluentd.enabled .Values.fluentd.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.fluentd.serviceAccount.name }}
  namespace: {{ .Values.namespace.name }}
  labels:
    app: fluentd
  # IRSA annotation — only added when aws.accountId is provided via --set
  {{- if .Values.aws.accountId }}
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::{{ toString .Values.aws.accountId }}:role/fluentd-s3-{{ .Values.global.environment }}"
  {{- end }}
{{- end }}
