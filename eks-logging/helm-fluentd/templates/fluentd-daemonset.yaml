# FluentD DaemonSet — runs one FluentD pod on every node in the cluster.
# DaemonSet (not Deployment) because FluentD needs access to each node's
# /var/log directory to read container log files written by the container runtime.
{{- if .Values.fluentd.enabled }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ .Values.namespace.name }}-fluentd
  namespace: {{ .Values.namespace.name }}
  labels:
    app: fluentd
spec:
  selector:
    matchLabels:
      app: fluentd
  updateStrategy:
    type: {{ .Values.fluentd.updateStrategy.type }}
  template:
    metadata:
      labels:
        app: fluentd
      annotations:
        # Config checksum — forces a rolling restart when fluent.conf changes
        checksum/config: {{ include (print $.Template.BasePath "/fluentd-configmap.yaml") . | sha256sum }}
    spec:
      # Use the IRSA-annotated service account for S3 write permissions
      serviceAccountName: {{ .Values.fluentd.serviceAccount.name }}

      # Priority class — in prod, set to "system-node-critical" so FluentD is never
      # evicted by the kubelet when the node runs low on resources
      {{- if .Values.fluentd.priorityClassName }}
      priorityClassName: {{ .Values.fluentd.priorityClassName }}
      {{- end }}

      # FluentD runs as root because it needs to read host log files owned by root
      securityContext:
        runAsUser: {{ .Values.fluentd.securityContext.runAsUser }}
        runAsGroup: {{ .Values.fluentd.securityContext.runAsGroup }}

      # Tolerations allow FluentD to run on master/control-plane tainted nodes
      # This ensures logs from ALL nodes are collected
      {{- if .Values.fluentd.tolerations }}
      tolerations:
        {{- toYaml .Values.fluentd.tolerations | nindent 8 }}
      {{- end }}
      containers:
        - name: fluentd
          # Auto-compute ECR image URL from aws.accountId if repository is not explicitly set
          # This avoids hardcoding the AWS account ID in values files
          {{- $fluentdRepo := .Values.fluentd.image.repository }}
          {{- if not $fluentdRepo }}
          {{- $fluentdRepo = printf "%s.dkr.ecr.%s.amazonaws.com/fluentd-es-s3" (toString .Values.aws.accountId) .Values.aws.region }}
          {{- end }}
          image: "{{ $fluentdRepo }}:{{ .Values.fluentd.image.tag }}"
          imagePullPolicy: {{ .Values.fluentd.image.pullPolicy }}
          env:
            # Tell FluentD which config file to load
            - name: FLUENTD_CONF
              value: fluent.conf
          volumeMounts:
            # Mount the fluent.conf ConfigMap
            - name: config
              mountPath: /fluentd/etc/fluent.conf
              subPath: fluent.conf
            # Mount the host's /var/log to read container log files
            - name: varlog
              mountPath: /var/log
            # Mount Docker container logs directory (read-only for security)
            - name: dockercontainers
              mountPath: /var/lib/docker/containers
              readOnly: true
          resources:
            {{- toYaml .Values.fluentd.resources | nindent 12 }}
      volumes:
        # ConfigMap containing the full fluent.conf pipeline configuration
        - name: config
          configMap:
            name: {{ .Values.namespace.name }}-fluentd-config
        # Host path mount for /var/log — where container runtime writes log files
        - name: varlog
          hostPath:
            path: /var/log
        # Host path mount for Docker container logs
        - name: dockercontainers
          hostPath:
            path: /var/lib/docker/containers
{{- end }}
