# Staging environment values for FluentD.
# Larger buffers than dev for higher log volume. Uses the staging IRSA service account.
# NOTE: clusterName is a placeholder — update to the real staging cluster name when available.

global:
  environment: staging

fluentd:
  # Service account name — must match the IRSA trust policy for staging
  serviceAccount:
    name: fluentd-staging

  output:
    # Elasticsearch connection — same service name across all environments
    elasticsearch:
      host: "logging-elasticsearch"
      port: 9200
      scheme: http
      buffer:
        # Slightly slower flush for staging to reduce ES write pressure
        flushInterval: 10s
        flushThreadCount: 2

    # S3 backup bucket for the staging environment
    s3:
      bucket: eks-logs-312ubuntu-staging

  # Placeholder — update to the real staging EKS cluster name
  clusterName: eks-cluster-staging
