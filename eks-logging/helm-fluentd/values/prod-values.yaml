# Prod environment values — 4 flush threads, large buffers, priority class

global:
  environment: prod

fluentd:
  serviceAccount:
    name: fluentd-prod
  output:
    elasticsearch:
      host: "logging-elasticsearch"
      port: 9200
      scheme: http
      buffer:
        flushInterval: 10s
        flushThreadCount: 4
        chunkLimitSize: 4M
        totalLimitSize: 1G
    s3:
      bucket: eks-logs-312ubuntu-prod
      buffer:
        chunkLimitSize: 512M
        totalLimitSize: 10G
  clusterName: eks-cluster-prod
  priorityClassName: system-node-critical
