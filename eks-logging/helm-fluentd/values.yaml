# Default values for the FluentD Helm chart.
# Dev-friendly defaults. Override per environment in values/<env>-values.yaml.
#
# Key settings to tune per environment:
#   - serviceAccount.name: fluentd-<env> (must match the IRSA role trust policy)
#   - output.s3.bucket: eks-logs-312ubuntu-<env>
#   - clusterName: the actual EKS cluster name (used as a log metadata field)
#   - priorityClassName: set to "system-node-critical" in prod so FluentD is never evicted

global:
  team: ubuntu
  environment: dev

# AWS configuration — accountId is passed at deploy time via --set aws.accountId=<value>
# Used to construct the ECR image URL and the IRSA role ARN
aws:
  accountId: ""
  region: us-east-1

# Namespace is NOT created by this chart — the ES chart handles namespace creation
namespace:
  create: false
  name: logging

fluentd:
  enabled: true

  # Custom FluentD Docker image stored in ECR
  # If image.repository is empty, the template auto-computes it from aws.accountId:
  #   {accountId}.dkr.ecr.{region}.amazonaws.com/fluentd-es-s3:{tag}
  image:
    repository: ""
    tag: v1.16-es8-s3
    pullPolicy: Always

  # Kubernetes service account — annotated with IRSA role ARN for S3 access
  # The name must match what the IRSA trust policy expects: "fluentd-<env>"
  serviceAccount:
    create: true
    name: ""

  # FluentD runs as root (UID 0) because it needs to read host log files
  securityContext:
    runAsUser: 0
    runAsGroup: 0

  # Resource requests and limits for the FluentD container
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # Dual output configuration — Elasticsearch (real-time) + S3 (long-term backup)
  output:
    # Primary output: Elasticsearch for real-time log search via Kibana
    elasticsearch:
      host: "logging-elasticsearch"
      port: 9200
      scheme: http
      buffer:
        type: file
        path: /tmp/fluentd-es-buffer
        flushInterval: 5s
        flushThreadCount: 2
        chunkLimitSize: 2M
        totalLimitSize: 500M
        retryMaxInterval: 30
        retryForever: "true"

    # Secondary output: S3 for long-term log retention and compliance
    # Set bucket to "" to disable S3 output
    s3:
      bucket: ""
      region: us-east-1
      path: logs/
      encryption: AES256
      buffer:
        type: file
        path: /tmp/fluentd-s3-buffer
        timekey: 3600
        timekeyWait: 10m
        chunkLimitSize: 8m
        totalLimitSize: 5G

  # Cluster name — injected into every log record as a metadata field
  clusterName: projectx_cluster_ubuntu25b

  # Priority class — set to "system-node-critical" in prod so FluentD is never evicted
  # by the kubelet when the node is under resource pressure
  priorityClassName: ""

  # Tolerations — allow FluentD to run on master/control-plane nodes
  # This ensures logs from ALL nodes are collected, including system components
  tolerations:
    - key: node-role.kubernetes.io/master
      effect: NoSchedule
    - key: node-role.kubernetes.io/control-plane
      effect: NoSchedule

  # Rolling update strategy for the DaemonSet
  updateStrategy:
    type: RollingUpdate
