# Conditionally creates the "logging" namespace.
# Disabled by default (namespace.create=false) because the Elasticsearch chart creates it first.
# Only enable this if deploying FluentD standalone without Elasticsearch.
{{- if .Values.namespace.create }}
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.namespace.name }}
  labels:
    app: fluentd
{{- end }}
