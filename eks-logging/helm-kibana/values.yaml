# Default values for the Kibana Helm chart.
# Dev-friendly defaults. Override per environment in values/<env>-values.yaml.
#
# Cross-chart reference: Kibana connects to Elasticsearch using the explicit
# elasticsearch.host and elasticsearch.port values below. These must match the
# ES service name created by the helm-elasticsearch chart (namespace.name + "-elasticsearch").

global:
  team: ubuntu
  environment: dev

# Namespace is NOT created by this chart — the ES chart handles namespace creation
namespace:
  create: false
  name: logging

# Elasticsearch connection — cross-chart reference (not computed, set explicitly)
# This value must match the ES service: {{ namespace.name }}-elasticsearch
elasticsearch:
  host: "logging-elasticsearch"
  port: 9200

kibana:
  enabled: true

  # Official Elastic Kibana Docker image — must match the ES version
  image:
    repository: docker.elastic.co/kibana/kibana
    tag: 8.5.1
    pullPolicy: IfNotPresent

  # Number of Kibana replicas (1 for dev/staging, 2 for prod HA)
  replicas: 1

  # Server name displayed in the Kibana UI
  serverName: kibana

  # Xpack security — must match the ES cluster's security configuration
  # When enabled, requires an encryptionKey for encrypted saved objects
  # NOTE: Do NOT set "xpack.security.enabled: false" in Kibana 8.x — the key
  # doesn't exist in Kibana and causes a FATAL crash. Just omit the block.
  security:
    enabled: false
    encryptionKey: ""

  # Resource requests and limits for the Kibana container
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi

  # ClusterIP service on port 5601 — the Ingress routes external traffic to this
  service:
    type: ClusterIP
    port: 5601

  # Health check probes — all use /app/kibana endpoint
  # Startup probe has high failureThreshold because Kibana is slow to initialize
  probes:
    readiness:
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
    liveness:
      initialDelaySeconds: 60
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
    startup:
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 30

  # Pod anti-affinity — same options as ES: "" (none), "soft", "hard"
  antiAffinity: ""

  # PodDisruptionBudget — enabled in prod where replicas > 1
  pdb:
    enabled: false
    maxUnavailable: 1

  # Ingress configuration — exposes Kibana externally via nginx ingress controller
  ingress:
    enabled: true
    className: nginx
    host: kibana-ubuntu-dev.312ubuntu.com

    # TLS — disabled in dev (HTTP), enabled in staging/prod (HTTPS via cert-manager)
    tls:
      enabled: false
      secretName: kibana-tls

    # SSL redirect — disabled in dev (no cert), enabled in staging/prod
    sslRedirect: "false"

    # IP whitelist — restricts access to specific CIDR ranges via nginx annotation
    whitelistSourceRange: "73.45.178.26/32"

    # Basic auth — references a K8s secret created by create-kibana-secret.sh
    authSecret: kibana-basic-auth
    authRealm: "Kibana Authentication"

    # Proxy settings — increased timeouts for Kibana's slow initial load
    proxyBodySize: 50m
    proxyReadTimeout: "120"
    proxySendTimeout: "120"
