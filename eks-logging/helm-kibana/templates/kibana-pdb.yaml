{{- if and .Values.kibana.enabled .Values.kibana.pdb.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ .Values.namespace.name }}-kibana
  namespace: {{ .Values.namespace.name }}
  labels:
    app: kibana
spec:
  maxUnavailable: {{ .Values.kibana.pdb.maxUnavailable }}
  selector:
    matchLabels:
      app: kibana
{{- end }}
