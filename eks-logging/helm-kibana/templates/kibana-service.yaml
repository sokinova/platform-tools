# ClusterIP service for Kibana — internal access point on port 5601.
# The Ingress routes external traffic to this service.
{{- if .Values.kibana.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.namespace.name }}-kibana
  namespace: {{ .Values.namespace.name }}
  labels:
    app: kibana
spec:
  type: {{ .Values.kibana.service.type }}
  ports:
    # Kibana HTTP UI port
    - name: http
      port: {{ .Values.kibana.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    app: kibana
{{- end }}
