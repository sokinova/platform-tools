# Dev environment values for Kibana.
# Single replica, security off, HTTP ingress (no TLS).
# Connects to Elasticsearch at "logging-elasticsearch:9200".

global:
  environment: dev

# Elasticsearch service name — must match the ES chart's service
elasticsearch:
  host: "logging-elasticsearch"
  port: 9200

kibana:
  # Single replica for dev
  replicas: 1

  # No xpack security in dev — ES also has security disabled
  security:
    enabled: false

  ingress:
    enabled: true
    # Dev Kibana URL — DNS must point to the NLB
    host: kibana-ubuntu-dev.312ubuntu.com
    # No TLS in dev — plain HTTP
    tls:
      enabled: false
    sslRedirect: "false"
    # IP whitelist — only allow access from the team's IP
    whitelistSourceRange: "73.45.178.26/32"
