apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kibana-dev-ingress
  namespace: logging
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    # IP Whitelist - only allow specified IPs
    nginx.ingress.kubernetes.io/whitelist-source-range: "73.45.178.26/32"
    # Basic authentication
    nginx.ingress.kubernetes.io/auth-type: basic
    nginx.ingress.kubernetes.io/auth-secret: kibana-basic-auth
    nginx.ingress.kubernetes.io/auth-realm: "Authentication Required - Kibana Dev"
    # Proxy settings for Kibana
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
  labels:
    app: kibana
    environment: dev
spec:
  ingressClassName: nginx
  rules:
    - host: kibana-ubuntu-dev.312ubuntu.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kibana-dev-kibana
                port:
                  number: 5601
