# Kibana Ingress - Exposes Kibana UI to the internet with security controls
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kibana-dev-ingress
  namespace: logging                         # Must match where Kibana is deployed
  annotations:
    kubernetes.io/ingress.class: nginx       # Use nginx ingress controller
    nginx.ingress.kubernetes.io/ssl-redirect: "false"  # No HTTPS redirect (dev only)

    # IP Whitelist - Only these IPs can access Kibana (security layer 1)
    nginx.ingress.kubernetes.io/whitelist-source-range: "73.45.178.26/32"

    # Basic Auth - Username/password required (security layer 2)
    nginx.ingress.kubernetes.io/auth-type: basic
    nginx.ingress.kubernetes.io/auth-secret: kibana-basic-auth  # K8s secret with htpasswd
    nginx.ingress.kubernetes.io/auth-realm: "Authentication Required - Kibana Dev"

    # Proxy settings - Handle large log queries and slow responses
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"      # Max request size
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"   # 5 min read timeout
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"   # 5 min send timeout
  labels:
    app: kibana
    environment: dev
spec:
  ingressClassName: nginx                    # Required for newer K8s versions
  rules:
    - host: kibana-ubuntu-dev.312ubuntu.com  # DNS must point to ingress LB
      http:
        paths:
          - path: /                          # All paths go to Kibana
            pathType: Prefix
            backend:
              service:
                name: kibana-dev-kibana      # Service created by Helm chart
                port:
                  number: 5601               # Kibana default port
