# Kibana Basic Auth Secret Template
# This file is a template - the actual secret should be created using
# the create-kibana-secret.sh script which fetches credentials from
# AWS SecretsManager and generates the htpasswd format.
#
# DO NOT commit real credentials to this file.
#
# Usage:
#   ./scripts/create-kibana-secret.sh dev
#
# Manual creation (for reference):
#   htpasswd -c auth admin
#   kubectl create secret generic kibana-basic-auth \
#     --from-file=auth \
#     -n logging
---
apiVersion: v1
kind: Secret
metadata:
  name: kibana-basic-auth
  namespace: logging
  labels:
    app: kibana
    component: authentication
type: Opaque
data:
  # Base64 encoded htpasswd file content
  # Format: username:password_hash
  # Generate with: htpasswd -nb admin <password> | base64
  auth: ""  # Placeholder - populated by create-kibana-secret.sh
