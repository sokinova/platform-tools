# FluentD Helm values for staging environment
# Chart: fluent/fluentd v0.5.2
# Log collector that runs on every node and sends logs to Elasticsearch and S3

# DaemonSet means one pod runs on every node automatically
kind: DaemonSet

# Custom image with Elasticsearch + S3 plugins (built from eks-logging/docker/fluentd/Dockerfile)
# The ${AWS_ACCOUNT_ID} placeholder is replaced at deploy time by the script
image:
  repository: ${AWS_ACCOUNT_ID}.dkr.ecr.us-east-1.amazonaws.com/fluentd-es-s3
  tag: v1.16-es8-s3

# ServiceAccount with IRSA - allows FluentD to write to S3 without hardcoded credentials
# The ${AWS_ACCOUNT_ID} placeholder is replaced at deploy time by the script
serviceAccount:
  create: true                               # Helm creates the ServiceAccount
  name: fluentd-staging                      # ServiceAccount name
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::${AWS_ACCOUNT_ID}:role/fluentd-s3-staging"  # IAM role for S3 access

# Run as root - required to read /var/log hostPath and maintain pos_file
securityContext:
  runAsUser: 0
  runAsGroup: 0

# Resource limits - moderate for staging
resources:
  requests:
    cpu: "200m"                              # 0.2 CPU cores
    memory: "512Mi"                          # 512MB RAM
  limits:
    cpu: "1000m"                             # Max 1 CPU core
    memory: "1Gi"                            # Max 1GB RAM

# Environment variables - configure Elasticsearch connection
env:
  - name: K8S_NODE_NAME                      # Inject node name into logs
    valueFrom:
      fieldRef:
        fieldPath: spec.nodeName

# FluentD pipeline configuration
# IMPORTANT: Must override ALL default fileConfigs (01-04) to prevent
# chart defaults from trying to authenticate to ES with user/password
fileConfigs:
  # SOURCE: Tail container logs and expose Prometheus metrics
  01_sources.conf: |-
    <source>
      @type tail
      @id in_tail_container_logs
      @label @KUBERNETES
      path /var/log/containers/*.log
      pos_file /var/log/fluentd-containers.log.pos
      tag kubernetes.*
      read_from_head true
      <parse>
        @type multi_format
        <pattern>
          format json
          time_key time
          time_type string
          time_format "%Y-%m-%dT%H:%M:%S.%NZ"
          keep_time_key false
        </pattern>
        <pattern>
          format regexp
          expression /^(?<time>.+) (?<stream>stdout|stderr)( (.))? (?<log>.*)$/
          time_format '%Y-%m-%dT%H:%M:%S.%NZ'
          keep_time_key false
        </pattern>
      </parse>
      emit_unmatched_lines true
    </source>

    <source>
      @type prometheus
      bind 0.0.0.0
      port 24231
      metrics_path /metrics
    </source>

  # FILTER: Enrich logs with K8s metadata and custom fields
  02_filters.conf: |-
    <label @KUBERNETES>
      <match kubernetes.var.log.containers.fluentd**>
        @type relabel
        @label @FLUENT_LOG
      </match>

      <filter kubernetes.**>
        @type kubernetes_metadata
        @id filter_kube_metadata
        skip_labels false
        skip_container_metadata false
        skip_namespace_metadata true
        skip_master_url true
      </filter>

      <filter kubernetes.**>
        @type record_transformer
        <record>
          cluster_name temporary-eks-cluster-staging
          environment staging
        </record>
      </filter>

      <match **>
        @type relabel
        @label @DISPATCH
      </match>
    </label>

  # DISPATCH: Prometheus metrics then forward to output
  03_dispatch.conf: |-
    <label @DISPATCH>
      <filter **>
        @type prometheus
        <metric>
          name fluentd_input_status_num_records_total
          type counter
          desc The total number of incoming records
          <labels>
            tag ${tag}
            hostname ${hostname}
          </labels>
        </metric>
      </filter>

      <match **>
        @type relabel
        @label @OUTPUT
      </match>
    </label>

  # OUTPUT: Dual output - Elasticsearch (primary) + S3 (backup)
  # Uses @type copy to send every log record to both destinations
  04_outputs.conf: |-
    <label @OUTPUT>
      <match **>
        @type copy

        # Primary: Elasticsearch for real-time search/dashboards
        <store>
          @type elasticsearch
          host "elasticsearch-master"
          port 9200
          scheme http
          ssl_verify false
          logstash_format true
          logstash_prefix kubernetes
          suppress_type_name true
          include_tag_key true
          <buffer>
            @type file
            path /tmp/fluentd-es-buffer
            flush_mode interval
            flush_interval 5s
            retry_type exponential_backoff
            retry_forever false
            retry_max_interval 30
            chunk_limit_size 2M
            queue_limit_length 8
            overflow_action block
          </buffer>
        </store>

        # Backup: S3 for long-term retention and compliance
        # Credentials provided via IRSA (ServiceAccount annotation above)
        <store>
          @type s3
          s3_bucket eks-logs-312ubuntu-staging
          s3_region us-east-1
          path logs/
          s3_object_key_format %{path}%{index}.%{file_extension}
          store_as gzip
          use_server_side_encryption AES256
          <buffer>
            @type file
            path /tmp/fluentd-s3-buffer
            flush_mode interval
            flush_interval 60s
            retry_type exponential_backoff
            retry_forever false
            retry_max_interval 30
            chunk_limit_size 8m
            queue_limit_length 8
            overflow_action block
          </buffer>
          <format>
            @type json
          </format>
        </store>

      </match>
    </label>

# Tolerations - allow FluentD to run on master/control-plane nodes too
tolerations:
  - key: node-role.kubernetes.io/master
    effect: NoSchedule
  - key: node-role.kubernetes.io/control-plane
    effect: NoSchedule

# Node placement - run on all nodes (DaemonSet default behavior)
nodeSelector: {}

# Update strategy - how to roll out updates
updateStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 1
