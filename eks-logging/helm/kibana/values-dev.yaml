# Kibana Helm values for dev environment
# Chart: elastic/kibana v8.5.1

replicas: 1

# Elasticsearch connection
elasticsearchHosts: "http://elasticsearch-dev-master:9200"

# Protocol for Elasticsearch connection (http for dev, https for prod)
protocol: http

# Disable managed service account token since ES security is disabled
managedServiceAccount: false

# Resource configuration - minimal for dev
resources:
  requests:
    cpu: "250m"
    memory: "512Mi"
  limits:
    cpu: "500m"
    memory: "1Gi"

# Kibana configuration
kibanaConfig:
  kibana.yml: |
    server.name: kibana-dev
    server.host: "0.0.0.0"
    elasticsearch.hosts: ["http://elasticsearch-dev-master:9200"]
    monitoring.ui.container.elasticsearch.enabled: true

# Health check
healthCheckPath: "/app/kibana"

# Service - ClusterIP, exposed via Ingress
service:
  type: ClusterIP
  port: 5601

# Ingress - disabled here, managed separately
ingress:
  enabled: false

# Security context
securityContext:
  capabilities:
    drop:
      - ALL
  runAsNonRoot: true
  runAsUser: 1000

# Pod security context
podSecurityContext:
  fsGroup: 1000

# Readiness probe
readinessProbe:
  failureThreshold: 3
  initialDelaySeconds: 10
  periodSeconds: 10
  successThreshold: 3
  timeoutSeconds: 5

# Node selector
nodeSelector: {}

tolerations: []

affinity: {}
