# Kibana Helm values for staging environment
# Chart: elastic/kibana v8.5.1
# Web UI for viewing and querying Elasticsearch logs

# Cluster size - single replica for staging
replicas: 1

# Elasticsearch connection - where Kibana fetches data from
# NOTE: Service name is "elasticsearch-master" (chart default masterService)
# regardless of Helm release name. Each env runs on its own cluster.
elasticsearchHosts: "http://elasticsearch-master:9200"

# Resource configuration - moderate for staging
resources:
  requests:
    cpu: "500m"                              # 0.5 CPU cores
    memory: "1Gi"                            # 1GB RAM
  limits:
    cpu: "1000m"                             # Max 1 CPU core
    memory: "2Gi"                            # Max 2GB RAM

# Kibana configuration file
kibanaConfig:
  kibana.yml: |
    server.name: kibana-staging              # Instance name shown in UI
    server.host: "0.0.0.0"                   # Listen on all interfaces
    elasticsearch.hosts: ["http://elasticsearch-master:9200"]  # ES endpoint
    monitoring.ui.container.elasticsearch.enabled: true  # Enable ES monitoring
    xpack.security.enabled: true             # Security enabled for staging

# Health check endpoint - Kibana ready when this returns 200
healthCheckPath: "/app/kibana"

# Service - ClusterIP means internal only, Ingress handles external access
service:
  type: ClusterIP                            # No external LB, use Ingress instead
  port: 5601                                 # Kibana default port

# Ingress - disabled here because we manage it separately with IP whitelist
ingress:
  enabled: false

# Security context - run as non-root user (security best practice)
securityContext:
  capabilities:
    drop:
      - ALL                                  # Drop all Linux capabilities
  runAsNonRoot: true                         # Don't run as root
  runAsUser: 1000                            # Run as user ID 1000

# Pod security - filesystem group for volume permissions
podSecurityContext:
  fsGroup: 1000                              # Group ID for mounted volumes

# Readiness probe - when is pod ready to receive traffic
readinessProbe:
  failureThreshold: 3                        # Fail after 3 consecutive failures
  initialDelaySeconds: 10                    # Wait 10s before first check
  periodSeconds: 10                          # Check every 10s
  successThreshold: 3                        # Need 3 successes to be ready
  timeoutSeconds: 5                          # Each check times out after 5s

# Node placement - empty means any node
nodeSelector: {}
tolerations: []
affinity: {}
