# Elasticsearch Helm values for dev environment
# Chart: elastic/elasticsearch v8.5.1
# Single node configuration for development

# Cluster size - single node for dev (no HA needed)
replicas: 1
minimumMasterNodes: 1                        # Minimum nodes to form a cluster

# Protocol - HTTP for dev (security disabled), HTTPS for staging/prod
protocol: http

# Resource limits - minimal for dev to save costs
resources:
  requests:
    cpu: "500m"                              # 0.5 CPU cores requested
    memory: "1Gi"                            # 1GB RAM requested
  limits:
    cpu: "1000m"                             # Max 1 CPU core
    memory: "2Gi"                            # Max 2GB RAM

# JVM heap - should be ~50% of memory limit (ES recommendation)
esJavaOpts: "-Xmx512m -Xms512m"              # Min and max heap size

# Persistence - DISABLED for dev (data lost on pod restart)
# Reason: EBS CSI driver not available on this cluster
# For staging/prod: Enable this and ensure EBS CSI driver is installed
persistence:
  enabled: false                             # Uses emptyDir instead of PVC

# Health check - accept yellow status (normal for single node)
clusterHealthCheckParams: "wait_for_status=yellow&timeout=1s"

# Security - DISABLED for dev simplicity (uses HTTP not HTTPS)
# For staging/prod: Remove this block to enable default security
esConfig:
  elasticsearch.yml: |
    xpack.security.enabled: false            # No authentication required
    xpack.security.enrollment.enabled: false  # No node enrollment
    xpack.security.http.ssl.enabled: false   # Disable HTTPS (ES 8.x enables SSL separately)
    xpack.security.transport.ssl.enabled: false  # Disable transport SSL
    cluster.name: "elasticsearch-dev"        # Cluster identifier
    network.host: 0.0.0.0                    # Listen on all interfaces

# Pod placement - soft anti-affinity allows multiple pods on same node
antiAffinity: "soft"

# Node targeting - empty means schedule on any node
nodeSelector: {}
tolerations: []

# Service - ClusterIP means internal-only access (no external LB)
service:
  type: ClusterIP                            # Only accessible within cluster
  httpPortName: http                         # Port 9200 for REST API
  transportPortName: transport               # Port 9300 for node-to-node

# Ingress - disabled because users access ES through Kibana, not directly
ingress:
  enabled: false

# Readiness probe - when is the pod ready to receive traffic
readinessProbe:
  failureThreshold: 3                        # Fail after 3 consecutive failures
  initialDelaySeconds: 10                    # Wait 10s before first check
  periodSeconds: 10                          # Check every 10s
  successThreshold: 3                        # Need 3 successes to be ready
  timeoutSeconds: 5                          # Each check times out after 5s

# Graceful shutdown - wait before terminating to finish requests
lifecycle:
  preStop:
    exec:
      command: ["/bin/sh", "-c", "sleep 20"] # Wait 20s for connections to drain
