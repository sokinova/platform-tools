# Elasticsearch Helm values for dev environment
# Chart: elastic/elasticsearch v8.5.1
# Single node configuration for development

replicas: 1
minimumMasterNodes: 1

# Resource configuration - minimal for dev
resources:
  requests:
    cpu: "500m"
    memory: "1Gi"
  limits:
    cpu: "1000m"
    memory: "2Gi"

# JVM heap - should be ~50% of memory limit
esJavaOpts: "-Xmx512m -Xms512m"

# Persistence - disabled for dev (using emptyDir)
# EBS CSI driver not available on this cluster
# For staging/prod, ensure EBS CSI driver is installed first
persistence:
  enabled: false

# Single node discovery
clusterHealthCheckParams: "wait_for_status=yellow&timeout=1s"

# Security - disabled for dev simplicity
# Enable xpack security for staging/prod
esConfig:
  elasticsearch.yml: |
    xpack.security.enabled: false
    xpack.security.enrollment.enabled: false
    cluster.name: "elasticsearch-dev"
    network.host: 0.0.0.0

# Pod antiaffinity - disabled for single node dev
antiAffinity: "soft"

# Node selector - optional, can target specific node groups
nodeSelector: {}

tolerations: []

# Service configuration
service:
  type: ClusterIP
  httpPortName: http
  transportPortName: transport

# Ingress - disabled, accessed via Kibana
ingress:
  enabled: false

# Readiness probe
readinessProbe:
  failureThreshold: 3
  initialDelaySeconds: 10
  periodSeconds: 10
  successThreshold: 3
  timeoutSeconds: 5

# Lifecycle hooks for graceful shutdown
lifecycle:
  preStop:
    exec:
      command: ["/bin/sh", "-c", "sleep 20"]
