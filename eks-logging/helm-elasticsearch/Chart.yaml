# Helm chart metadata for the Elasticsearch component of the EFK logging stack.
# This chart deploys Elasticsearch as a StatefulSet into the "logging" namespace.
# It is the first chart deployed in the EFK stack because it creates the shared namespace
# and provides the search/indexing backend that Kibana and FluentD depend on.
#
# Usage:
#   helm upgrade --install elasticsearch-dev ./eks-logging/helm-elasticsearch \
#     --namespace logging --create-namespace \
#     --values ./eks-logging/helm-elasticsearch/values/dev-values.yaml \
#     --wait --timeout 10m

apiVersion: v2
name: helm-elasticsearch
description: Elasticsearch for centralized logging on Amazon EKS
type: application
version: 1.0.0
appVersion: "8.5.1"
keywords:
  - logging
  - elasticsearch
  - efk
  - eks
maintainers:
  - name: ubuntu-team
