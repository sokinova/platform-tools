# Conditionally creates the "logging" namespace.
# Only the Elasticsearch chart should set namespace.create=true (it deploys first).
# Kibana and FluentD charts set namespace.create=false to avoid duplicate creation.
{{- if .Values.namespace.create }}
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.namespace.name }}
  labels:
    app: elasticsearch
{{- end }}
