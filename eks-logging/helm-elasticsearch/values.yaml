# Default values for the Elasticsearch Helm chart.
# These are dev-friendly defaults. Override per environment in values/<env>-values.yaml.
#
# Key settings to tune per environment:
#   - replicas: 1 (dev), 2 (staging), 3 (prod)
#   - persistence: off (dev), on with gp2 EBS (staging/prod)
#   - security: off (dev), xpack on (staging), xpack + transport SSL (prod)
#   - antiAffinity: none (dev), soft (staging), hard (prod)
#   - pdb: off (dev), on (staging/prod)

global:
  team: ubuntu
  environment: dev

# Namespace configuration — ES chart is the only one with create=true
namespace:
  create: true
  name: logging

elasticsearch:
  enabled: true

  # Official Elastic Docker image
  image:
    repository: docker.elastic.co/elasticsearch/elasticsearch
    tag: 8.5.1
    pullPolicy: IfNotPresent

  # Number of ES nodes in the StatefulSet
  replicas: 1

  # Cluster name used in elasticsearch.yml for node discovery
  clusterName: eks-logging

  # Xpack security settings — disabled in dev to simplify setup
  # Staging enables xpack, prod adds transport SSL for inter-node encryption
  security:
    enabled: false
    transportSsl: false

  # JVM heap size — should be ~50% of the memory limit
  javaOpts: "-Xmx512m -Xms512m"

  # Persistent volume settings — disabled in dev (uses emptyDir instead)
  # Staging/prod use gp2 EBS volumes via volumeClaimTemplates
  persistence:
    enabled: false
    storageClass: gp2
    size: 10Gi

  # Resource requests and limits for the ES container
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "1"
      memory: 2Gi

  # Pod anti-affinity ensures ES pods are spread across nodes
  # Options: "" (none), "soft" (preferred), "hard" (required)
  antiAffinity: ""

  # PodDisruptionBudget — prevents too many ES pods from being evicted at once
  # Enabled in staging/prod to protect cluster availability during upgrades
  pdb:
    enabled: false
    maxUnavailable: 1

  # Service ports — 9200 for HTTP REST API, 9300 for inter-node transport
  service:
    type: ClusterIP
    httpPort: 9200
    transportPort: 9300

  # Health check probes — all use /_cluster/health?local=true endpoint
  # Startup probe has high failureThreshold (30) because ES is slow to initialize
  probes:
    readiness:
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
    liveness:
      initialDelaySeconds: 90
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
    startup:
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 30

  # Init container that sets vm.max_map_count=262144 (required by ES)
  # Runs as privileged to modify kernel parameters on the host
  sysctlInit:
    enabled: true

  # Grace period for ES to flush data and close connections before SIGKILL
  terminationGracePeriodSeconds: 120
