# Staging environment values for Elasticsearch.
# 2 replicas with persistence and security — mirrors prod with smaller resources.
# Used for integration testing and pre-production validation.

global:
  environment: staging

elasticsearch:
  # Two nodes for basic HA — primary + replica shards
  replicas: 2

  # 1GB heap for moderate log volume
  javaOpts: "-Xmx1g -Xms1g"

  # 50Gi gp2 EBS persistent volumes via volumeClaimTemplates
  persistence:
    enabled: true
    storageClass: gp2
    size: 50Gi

  # Increased resources for staging workloads
  resources:
    requests:
      cpu: "1"
      memory: 2Gi
    limits:
      cpu: "2"
      memory: 4Gi

  # Soft anti-affinity — prefer spreading across nodes but don't block scheduling
  antiAffinity: soft

  # PDB prevents both pods from being evicted simultaneously during upgrades
  pdb:
    enabled: true
    maxUnavailable: 1

  # Xpack security on, but transport SSL off (not needed with 2 nodes in same VPC)
  security:
    enabled: true
    transportSsl: false
