# Elasticsearch StatefulSet — the core data store for the EFK logging stack.
# StatefulSet (not Deployment) because ES nodes need stable network identities
# and persistent storage that survives pod rescheduling.
{{- if .Values.elasticsearch.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Values.namespace.name }}-elasticsearch
  namespace: {{ .Values.namespace.name }}
  labels:
    app: elasticsearch
spec:
  # Links to the headless service for stable DNS names (pod-0.headless-svc, pod-1.headless-svc)
  serviceName: {{ .Values.namespace.name }}-elasticsearch-headless
  replicas: {{ .Values.elasticsearch.replicas }}
  selector:
    matchLabels:
      app: elasticsearch
  template:
    metadata:
      labels:
        app: elasticsearch
      annotations:
        # Config checksum — forces a rolling restart when elasticsearch.yml changes
        checksum/config: {{ include (print $.Template.BasePath "/elasticsearch-configmap.yaml") . | sha256sum }}
    spec:
      # Allow ES to finish flushing data and close connections gracefully before SIGKILL
      terminationGracePeriodSeconds: {{ .Values.elasticsearch.terminationGracePeriodSeconds }}

      # Init container to set vm.max_map_count kernel parameter (required by ES)
      # ES needs at least 262144 memory map areas; the default (65530) causes startup failure
      {{- if .Values.elasticsearch.sysctlInit.enabled }}
      initContainers:
        - name: sysctl
          image: busybox:1.36
          command: ["sysctl", "-w", "vm.max_map_count=262144"]
          securityContext:
            privileged: true
            runAsUser: 0
      {{- end }}
      containers:
        - name: elasticsearch
          image: "{{ .Values.elasticsearch.image.repository }}:{{ .Values.elasticsearch.image.tag }}"
          imagePullPolicy: {{ .Values.elasticsearch.image.pullPolicy }}
          ports:
            # HTTP REST API port — used by Kibana and FluentD to connect
            - name: http
              containerPort: {{ .Values.elasticsearch.service.httpPort }}
              protocol: TCP
            # Transport port — used for inter-node communication within the ES cluster
            - name: transport
              containerPort: {{ .Values.elasticsearch.service.transportPort }}
              protocol: TCP
          env:
            # node.name must match the StatefulSet pod name for cluster discovery to work
            - name: node.name
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            # JVM heap settings — should be ~50% of the container memory limit
            - name: ES_JAVA_OPTS
              value: {{ .Values.elasticsearch.javaOpts | quote }}
          volumeMounts:
            # Mount the ConfigMap as elasticsearch.yml
            - name: config
              mountPath: /usr/share/elasticsearch/config/elasticsearch.yml
              subPath: elasticsearch.yml
            # Mount the data volume (emptyDir in dev, PVC in staging/prod)
            - name: data
              mountPath: /usr/share/elasticsearch/data
          resources:
            {{- toYaml .Values.elasticsearch.resources | nindent 12 }}

          # Readiness probe — pod only receives traffic when ES reports healthy
          readinessProbe:
            httpGet:
              path: /_cluster/health?local=true
              port: http
            initialDelaySeconds: {{ .Values.elasticsearch.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.elasticsearch.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.elasticsearch.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.elasticsearch.probes.readiness.failureThreshold }}

          # Liveness probe — restarts the container if ES becomes unresponsive
          livenessProbe:
            httpGet:
              path: /_cluster/health?local=true
              port: http
            initialDelaySeconds: {{ .Values.elasticsearch.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.elasticsearch.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.elasticsearch.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.elasticsearch.probes.liveness.failureThreshold }}

          # Startup probe — gives ES up to ~5 minutes to initialize before liveness kicks in
          # ES is slow to start (JVM warmup, index recovery), so this prevents premature restarts
          startupProbe:
            httpGet:
              path: /_cluster/health?local=true
              port: http
            initialDelaySeconds: {{ .Values.elasticsearch.probes.startup.initialDelaySeconds }}
            periodSeconds: {{ .Values.elasticsearch.probes.startup.periodSeconds }}
            timeoutSeconds: {{ .Values.elasticsearch.probes.startup.timeoutSeconds }}
            failureThreshold: {{ .Values.elasticsearch.probes.startup.failureThreshold }}

      # Pod anti-affinity — spreads ES pods across different nodes
      # "soft" = preferredDuringScheduling (best-effort), "hard" = requiredDuringScheduling (mandatory)
      {{- if or (eq .Values.elasticsearch.antiAffinity "soft") (eq .Values.elasticsearch.antiAffinity "hard") }}
      affinity:
        podAntiAffinity:
          {{- if eq .Values.elasticsearch.antiAffinity "hard" }}
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: elasticsearch
              topologyKey: kubernetes.io/hostname
          {{- else }}
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: elasticsearch
                topologyKey: kubernetes.io/hostname
          {{- end }}
      {{- end }}
      volumes:
        # ConfigMap volume containing elasticsearch.yml
        - name: config
          configMap:
            name: {{ .Values.namespace.name }}-elasticsearch-config
        # When persistence is disabled, use emptyDir (ephemeral storage)
        {{- if not .Values.elasticsearch.persistence.enabled }}
        - name: data
          emptyDir: {}
        {{- end }}

  # When persistence is enabled, create a PVC per pod via volumeClaimTemplates
  # Each ES pod gets its own dedicated EBS volume that survives pod rescheduling
  {{- if .Values.elasticsearch.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.elasticsearch.persistence.storageClass }}
        storageClassName: {{ .Values.elasticsearch.persistence.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.elasticsearch.persistence.size }}
  {{- end }}
{{- end }}
