# PodDisruptionBudget for Elasticsearch — prevents too many pods from being evicted at once.
# Enabled in staging/prod to ensure cluster availability during voluntary disruptions
# (node drains, cluster upgrades, spot instance termination).
# maxUnavailable=1 means at most 1 ES pod can be down at any time.
{{- if and .Values.elasticsearch.enabled .Values.elasticsearch.pdb.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ .Values.namespace.name }}-elasticsearch
  namespace: {{ .Values.namespace.name }}
  labels:
    app: elasticsearch
spec:
  maxUnavailable: {{ .Values.elasticsearch.pdb.maxUnavailable }}
  selector:
    matchLabels:
      app: elasticsearch
{{- end }}
