{{- if and .Values.elasticsearch.enabled .Values.elasticsearch.pdb.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ .Values.namespace.name }}-elasticsearch
  namespace: {{ .Values.namespace.name }}
  labels:
    app: elasticsearch
spec:
  maxUnavailable: {{ .Values.elasticsearch.pdb.maxUnavailable }}
  selector:
    matchLabels:
      app: elasticsearch
{{- end }}
