apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod-dns
spec:
  acme:
    # Let's Encrypt production server
    server: https://acme-v02.api.letsencrypt.org/directory
    # Email for certificate expiry notifications
    email: aziza.sok@edu.312school.com
    # Secret to store ACME account private key
    privateKeySecretRef:
      name: letsencrypt-prod-dns-key
    # DNS-01 challenge solver for wildcard certificates
    solvers:
      - dns01:
          route53:
            region: us-east-1
            # Replace with your actual hosted zone ID
            hostedZoneID: HOSTED_ZONE_PLACEHOLDER
