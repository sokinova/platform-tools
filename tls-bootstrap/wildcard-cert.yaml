apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-cup-aziza-click-tls
  namespace: ingress-nginx
spec:
  secretName: wildcard-cup-aziza-click-tls
  issuerRef:
    name: letsencrypt-prod-dns
    kind: ClusterIssuer
  dnsNames:
    - "*.cup.aziza.click"
    - "cup.aziza.click"
